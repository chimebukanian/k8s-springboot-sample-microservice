apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      initContainers:
        - name: kafka-storage-format
          image: apache/kafka:3.9.0
          command: [ "/bin/sh", "-c" ]
          args:
            - "if [ ! -d /var/lib/kafka/data/__cluster_metadata ]; then
                 echo 'Formatting Kafka storage for KRaft...';
                 # Write directly to the inherently writable /tmp directory
                 echo 'log.dirs=/var/lib/kafka/data' > /tmp/server.properties;
                 echo 'node.id=$(KAFKA_NODE_ID)' >> /tmp/server.properties;
                 kafka-storage.sh format -t $(CLUSTER_ID) -c /tmp/server.properties --ignore-formatted;
               else
                 echo 'Kafka storage already formatted.';
               fi"


          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTg0NDM0Qzk4" # Use the same CLUSTER_ID
            - name: KAFKA_NODE_ID
              value: "1" # Pass node ID for server.properties
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-config-volume
              mountPath: /tmp/kafka-config # Mount config for kafka-storage.sh
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTg0NDM0Qzk4"

          volumeMounts:
            - mountPath: /var/lib/kafka/data
              name: kafka-data
            - name: kafka-config-volume # Mount config for kafka-storage.sh
              mountPath: /tmp/kafka-config
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-pvc
        - name: kafka-config-volume # Volume for initContainer to write a dummy config
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc
  labels:
    app: kafka
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
